# Alembic configuration for the broker-OS application layer (server/).
# The DB URL is resolved at runtime from DRAWBACK_DATABASE_URL (see server/db/migrations/env.py),
# defaulting to the local SQLite dev DB — so nothing secret is committed here.
[alembic]
script_location = server/db/migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is intentionally blank — env.py supplies it from the environment.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
