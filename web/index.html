<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Drawback Engine — duty-drawback eligibility and recovery decision-support. Preparation only; not the filer of record."
    />
    <title>Drawback Engine</title>
    <script>
      // Set the theme before first paint to avoid a flash. Mirrors theme.ts:
      // explicit localStorage choice wins, else OS preference, else light.
      (function () {
        try {
          var s = localStorage.getItem("drawback-theme");
          var t =
            s === "light" || s === "dark"
              ? s
              : window.matchMedia &&
                  window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
